        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: url('./cursor/conejo-normal.png') 16 16, auto; 
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
            transition: background-image 0.5s ease;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .text-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 197, 211, 0.8);
            padding: 50px 60px;
            max-width: 800px;
            width: 85%;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 10;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 0;
        }

        .page-text {
            color: #4a4a4a;
            font-size: 1.3rem;
            line-height: 1.4;
            text-align: left;
            white-space: pre-line;
            min-height: 200px;
            font-family: 'Georgia', serif;
        }

        .page-text h1 {
            color: #d44e6c;
            margin-bottom: 25px;
            font-size: 2.5rem;
            text-align: center;
            border-bottom: 2px dashed #d44e6c;
            padding-bottom: 15px;
        }

        .page-text p {
            margin: 15px 0;
            line-height: 5; 
        }

        .page-text .firma {
            margin-top: 30px;
            text-align: right;
            font-style: italic;
            font-size: 1.2rem;
            color: #b13e5c;
        }

.video-container {
    margin: 30px auto;
    position: relative;
    width: 100%;
    max-width: 400px;  /* ancho máximo, se centra automáticamente */
    aspect-ratio: 9 / 16;  /* relación vertical */
    overflow: hidden;
    border: 3px solid white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
        }

        .video-container video,
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .text-box::-webkit-scrollbar {
            width: 8px;
        }

        .text-box::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.3);
        }

        .text-box::-webkit-scrollbar-thumb {
            background: #d44e6c;
            border-radius: 4px;
        }

        .floating-image {
            position: absolute;
            cursor: url('./cursor/conejo-hover.png') 16 16, pointer;             
            z-index: 20;
            transition: transform 0.3s ease, filter 0.3s ease;
            max-width: 120px;
            max-height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .floating-image:hover {
            transform: scale(1.15) rotate(3deg);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4));
        }

        .floating-image.conejo-clickeado {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .nav-button {
            position: absolute;
            bottom: 30px;
            left: 30px;
            cursor: url('./cursor/conejo-hover.png') 16 16, pointer;             
            z-index: 30;
            max-width: 100px;
            transition: transform 0.2s ease;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        .nav-button:hover {
            transform: scale(1.1);
        }

        .secret-button {
            position: absolute;
            bottom: 30px;
            right: 30px;
            cursor: url('./cursor/conejo-hover.png') 16 16, pointer; 
            z-index: 30;
            max-width: 150px;
            transition: transform 0.2s ease;
            display: none;
            filter: drop-shadow(0 0 15px gold);
        }

        .secret-button.visible {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 15px gold); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 30px #ffd700); }
            100% { transform: scale(1); filter: drop-shadow(0 0 15px gold); }
        }

        .counter {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 197, 211, 0.95);
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            color: #4a4a4a;
            z-index: 40;
            border: 3px solid white;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 20px;
            height: 20px;
            top: -20px;
            animation: confetti-fall 4s ease-in forwards;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff3366;
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.5);
        }

        @keyframes confetti-fall {
            0% { 
                transform: translateY(0) rotate(0deg); 
                opacity: 1; 
            }
            100% { 
                transform: translateY(100vh) rotate(720deg); 
                opacity: 0; 
            }
        }
    </style>
